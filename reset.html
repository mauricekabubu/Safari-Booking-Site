{% extends "base.html" %}

{% block title %}
Forgot Password
{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center">
    <div class="card">
        <div class="card-body">
            <h5 class="card-title text-danger text-center mb-4">Reset Password</h5>

            <form action="{{ url_for('forgot_pass') }}" method="post">
                <div class="form-group mb-3">
                    <label>New Password</label>
                    <input 
                        type="password" 
                        name="password" 
                        class="form-control" 
                        placeholder="Enter new password" 
                        required
                    >
                </div>

                <div class="form-group mb-3">
                    <label>Confirm Password</label>
                    <input 
                        type="password" 
                        name="confirm_password" 
                        class="form-control" 
                        placeholder="Confirm password" 
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Reset Password
                </button>
            </form>
        </div>
    </div>
</div>

<style>
.container{
    min-height: 80vh;
}

.card{
    width: 400px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
</style>
{% endblock %}
