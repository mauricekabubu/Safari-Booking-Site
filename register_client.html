{% extends "base.html" %}


{% block title %}
register page
{% endblock %}

{% block content %}
<!-- Background -->
<div class="register-bg d-flex justify-content-center align-items-center">

    <!-- Glass Card -->
    <div class="register-card shadow-lg p-4">
        <h3 class="text-center mb-4 fw-bold">Create Your Account</h3>

        <form action="{{ url_for('register_client') }}" method="POST">

            <!-- Full Name -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text" name="full_names" class="form-control" placeholder="John Doe" required>
                </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="example@gmail.com" required>
                </div>
            </div>

            <!-- Phone -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Phone</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
                    <input type="tel" name="phone" class="form-control" placeholder="0746 348 754" required>
                </div>
            </div>

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-id-card"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="password2" class="form-control" placeholder="Re-enter password" required>
                </div>
            </div>

            <!-- Register Button -->
            <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Register</button>

            <!-- Login Link -->
            <div class="text-center mt-3">
                <p class="mb-0">
                    Already have an account?
                    <a href="{{ url_for('signup') }}" class="text-decoration-none fw-semibold">Login</a>
                </p>
            </div>

        </form>
    </div>
</div>

{% endblock %}
