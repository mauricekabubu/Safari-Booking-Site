{% extends "admin_base.html" %}

{% block title %}
add_gallery
{% endblock %}

{% block content %}
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Gallery</h3>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">Add Image</button>
    </div>    
    <table class="table table-bordered table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th style="width: 30%">Image</th>
                <th style="width: 180px;">Actions</th>
            </tr>
        </thead>
        <tbody>

            {% for image in images %}
            <tr>
                <td>
                    <img src="{{ url_for('static', filename='uploads/'+ image.image) }}"
                         alt="Image"
                         class="img-thumbnail"
                         style="height: 100px; object-fit: cover;">
                </td>
                <td>
                    <button class="btn btn-sm btn-warning me-2"
                            data-bs-toggle="modal"
                            data-bs-target="#editModal{{ image.id }}">
                        Edit
                    </button>

                    <button class="btn btn-sm btn-danger"
                            data-bs-toggle="modal"
                            data-bs-target="#deleteModal{{ image.id }}">
                            Delete
                    </button>
                </td>
            </tr>

            <!-- EDIT MODAL -->
            <div class="modal fade" id="editModal{{ image.id }}" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Edit Image</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <form action="{{url_for('edit_gallery',id=image.id)}}" method="POST" enctype="multipart/form-data">
                            <div class="modal-body">
                                <p>Current Image:</p>
                                <img src="{{ url_for('static', filename='uploads/' +image.image) }}"
                                     class="img-thumbnail mb-3" width="150">

                                <label class="form-label">Select New Image (optional)</label>
                                <input type="file" class="form-control" name="image">
                            </div>
                            <div class="modal-footer">
                                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                <button class="btn btn-warning" type="submit">Save Changes</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- DELETE MODAL -->
            <div class="modal fade" id="deleteModal{{image.id}}" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">

                        <div class="modal-header">
                            <h5 class="modal-title text-danger">Confirm Delete</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <form action="{{url_for('delete_image', id=image.id)}}" method="POST">
                            <div class="modal-body">
                                <p>Are you sure you want to delete this image?</p>
                            </div>

                            <div class="modal-footer">
                                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                <button class="btn btn-danger" type="submit">Delete</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
            {% endfor %}
        </tbody>
    </table>
</div>


    <!-- ADD IMAGE MODAL -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Add New Image</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <form action="{{url_for('add_to_gallery')}}" method="POST" enctype="multipart/form-data">
                    <div class="modal-body">

                        <label class="form-label">Upload Image</label>
                        <input type="file" class="form-control" name="image" required>

                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button class="btn btn-primary" type="submit">Add</button>
                    </div>
                </form>

            </div>
        </div>
    </div>

{% endblock %}
